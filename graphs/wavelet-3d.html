<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavelet Transform — 3D Scalogram</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
  :root{
    --bg:#050505;
    --panel:#0A0F1C;
    --gold:#C5A059;
    --gold-dim:rgba(197,160,89,.35);
    --text:#EDE8DC;
    --sub:#8a8577;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter','Noto Sans JP',sans-serif;
    min-height:100vh;
  }
  header{
    padding:22px 20px 12px;
    border-bottom:1px solid var(--gold-dim);
  }
  header h1{
    font-family:'Noto Serif JP',serif;
    font-weight:600;
    font-size:20px;
    letter-spacing:.06em;
    color:var(--gold);
  }
  header p{
    margin-top:6px;
    font-size:12px;
    color:var(--sub);
    letter-spacing:.04em;
  }
  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:14px 20px;
  }
  .controls button{
    background:transparent;
    border:1px solid var(--gold-dim);
    color:var(--text);
    font-size:12px;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    letter-spacing:.05em;
    transition:all .25s;
  }
  .controls button.active{
    background:var(--gold);
    color:#050505;
    border-color:var(--gold);
    font-weight:600;
  }
  .controls button:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }
  #surface{width:100%;height:52vh;min-height:340px;}
  #signal{width:100%;height:20vh;min-height:150px;}
  .caption{
    padding:10px 20px 24px;
    font-size:11.5px;
    line-height:1.7;
    color:var(--sub);
  }
  .caption b{color:var(--gold);font-weight:600;}
</style>
</head>
<body>
<header>
  <h1>Wavelet Transform ─ 3D スカログラム</h1>
  <p>連続ウェーブレット変換（Morlet）｜ X: 時間 ・ Y: 周波数 ・ Z: 振幅 |CWT|</p>
</header>

<div class="controls" id="btns">
  <button data-sig="chirp" class="active">チャープ信号（周波数上昇）</button>
  <button data-sig="burst">正弦波 + 突発バースト</button>
  <button data-sig="mix">2周波数の切替</button>
</div>

<div id="surface"></div>
<div id="signal"></div>

<div class="caption">
  <b>見方：</b>フーリエ変換は「どの周波数が含まれるか」しか分かりませんが、ウェーブレット変換は<b>「いつ・どの周波数が」</b>現れたかを同時に捉えます。山の位置が時間軸上を移動していく様子（チャープ）や、一瞬だけ現れるスパイク（バースト）が3Dの峰として浮かび上がります。ドラッグで回転、ピンチでズームできます。
</div>

<script>
const N = 400;          // サンプル数
const fs = 200;         // サンプリング周波数 Hz
const dt = 1/fs;
const nScales = 56;     // 周波数分解能
const fMin = 2, fMax = 60;
const w0 = 6;           // Morlet中心周波数パラメータ

// ---- 信号生成 ----
function makeSignal(type){
  const t = new Array(N), x = new Array(N);
  for(let i=0;i<N;i++){
    t[i]=i*dt;
    const ti=t[i];
    if(type==='chirp'){
      // 5Hz → 45Hz へ線形チャープ
      const f0=5, k=(45-5)/(N*dt);
      x[i]=Math.sin(2*Math.PI*(f0*ti + 0.5*k*ti*ti));
    }else if(type==='burst'){
      // 8Hzベース + 中央付近に40Hzバースト
      let v=0.8*Math.sin(2*Math.PI*8*ti);
      if(ti>0.9 && ti<1.15) v+=1.6*Math.sin(2*Math.PI*40*ti);
      x[i]=v;
    }else{
      // 前半10Hz / 後半35Hz
      x[i]= ti < N*dt/2 ? Math.sin(2*Math.PI*10*ti) : Math.sin(2*Math.PI*35*ti);
    }
  }
  return {t,x};
}

// ---- Morlet CWT（直接畳み込み・実装簡潔版）----
function cwt(x){
  const freqs=[], Z=[];
  for(let s=0;s<nScales;s++){
    // 対数間隔の周波数
    const f = fMin*Math.pow(fMax/fMin, s/(nScales-1));
    freqs.push(f);
    const scale = w0/(2*Math.PI*f);
    const half = Math.min(Math.ceil(4*scale/dt), N);
    const row = new Array(N);
    // ウェーブレット係数を事前計算
    const wr=[], wi=[];
    for(let k=-half;k<=half;k++){
      const tau=k*dt/scale;
      const g=Math.exp(-tau*tau/2)/Math.sqrt(scale);
      wr.push(g*Math.cos(w0*tau));
      wi.push(g*Math.sin(w0*tau));
    }
    for(let n=0;n<N;n++){
      let re=0,im=0;
      const k0=Math.max(-half,-n), k1=Math.min(half,N-1-n);
      for(let k=k0;k<=k1;k++){
        const v=x[n+k];
        re+=v*wr[k+half];
        im+=v*wi[k+half];
      }
      row[n]=Math.sqrt(re*re+im*im)*dt;
    }
    Z.push(row);
  }
  return {freqs,Z};
}

const goldScale=[
  [0.0,'#050505'],
  [0.25,'#0A0F1C'],
  [0.5,'#3d3320'],
  [0.75,'#8f7433'],
  [1.0,'#C5A059']
];

function render(type){
  const {t,x}=makeSignal(type);
  const {freqs,Z}=cwt(x);

  Plotly.react('surface',[{
    type:'surface',
    x:t, y:freqs, z:Z,
    colorscale:goldScale,
    showscale:false,
    lighting:{ambient:.6,diffuse:.7,specular:.25,roughness:.6},
    contours:{z:{show:true,usecolormap:true,project:{z:true}}}
  }],{
    paper_bgcolor:'#050505',
    margin:{l:0,r:0,t:6,b:0},
    scene:{
      xaxis:{title:'時間 (s)',color:'#8a8577',gridcolor:'#1c1c1c'},
      yaxis:{title:'周波数 (Hz)',color:'#8a8577',gridcolor:'#1c1c1c',type:'log'},
      zaxis:{title:'|CWT|',color:'#8a8577',gridcolor:'#1c1c1c'},
      bgcolor:'#050505',
      camera:{eye:{x:1.6,y:-1.7,z:0.9}}
    }
  },{responsive:true,displayModeBar:false});

  Plotly.react('signal',[{
    x:t,y:x,mode:'lines',
    line:{color:'#C5A059',width:1.4}
  }],{
    paper_bgcolor:'#050505',
    plot_bgcolor:'#050505',
    margin:{l:44,r:16,t:8,b:34},
    xaxis:{title:{text:'時間 (s)',font:{size:10,color:'#8a8577'}},color:'#8a8577',gridcolor:'#141414'},
    yaxis:{title:{text:'原信号',font:{size:10,color:'#8a8577'}},color:'#8a8577',gridcolor:'#141414'}
  },{responsive:true,displayModeBar:false});
}

document.getElementById('btns').addEventListener('click',e=>{
  const b=e.target.closest('button');
  if(!b)return;
  document.querySelectorAll('#btns button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  render(b.dataset.sig);
});

render('chirp');
</script>
</body>
</html>
